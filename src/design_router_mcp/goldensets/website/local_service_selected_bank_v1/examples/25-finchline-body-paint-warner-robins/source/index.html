<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finchline Body & Paint | Flawless Restoration</title>
    <meta name="description"
        content="Warner Robins' trusted family auto body and paint shop since 1977. Lifetime refinish warranty, premium craftsmanship.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Outfit for ultra-modern, geometric premium feel, paired with Inter for reading -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Persistent Ultra-Black Canvas -->
    <div class="site-wrapper">

        <!-- The Action Shot Background -->
        <div class="hero-bg-layer">
            <div class="spray-mist"></div>
        </div>

        <header class="header">
            <div class="header-inner">
                <div class="brand-lockup">
                    <span class="brand-text">FINCHLINE</span>
                    <span class="brand-subtext">BODY & PAINT</span>
                </div>
                <nav class="nav-links">
                    <a href="#story">Our Story</a>
                    <a href="#services">Services</a>
                    <a href="#gallery">Gallery</a>
                </nav>
            </div>
        </header>

        <main class="hero" id="home">
            <div class="hero-content">

                <!-- Delicate structural frame containing the hero text -->
                <div class="hero-frame">
                    <div class="frame-content">
                        <div class="icon-wrapper">
                            <!-- Premium Spray Gun SVG -->
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" class="spray-icon"
                                aria-hidden="true" focusable="false">
                                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                                    stroke-width="1.5"
                                    d="M14.636 10.636L20 5.273a2 2 0 00-2.828-2.828l-5.364 5.364M9.545 15.545c-2.316-2.316-5.819-2.585-8.414-.657L9.545 15.545zM14.455 10.636L9.545 15.545M10.636 14.636l5.364-5.364c1.928 2.595 2.197 6.098.657 8.414l-6.021-3.05z">
                                </path>
                            </svg>
                        </div>

                        <h1 class="hero-title">
                            AUTOMOTIVE<br>
                            PERFECTION<br>
                            <span class="since-text">SINCE 1977</span>
                        </h1>

                        <!-- Trust signals pulled into the hero cleanly -->
                        <div class="trust-row">
                            <span class="trust-badge">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"
                                    aria-hidden="true" focusable="false">
                                    <path
                                        d="M12 2L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-3zm-2 16l-4-4 1.41-1.41L10 15.17l6.59-6.59L18 10l-8 8z">
                                    </path>
                                </svg>
                                Lifetime Refinish Warranty
                            </span>
                            <span class="trust-badge">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"
                                    aria-hidden="true" focusable="false">
                                    <path
                                        d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z">
                                    </path>
                                </svg>
                                5-Star Rated
                            </span>
                        </div>
                    </div>
                </div>

                <a href="#consultation" class="btn-primary">
                    <span class="btn-text">BOOK CONSULTATION</span>
                    <div class="btn-glow" aria-hidden="true"></div>
                </a>
                <a href="tel:4785550125" class="hero-call">OR CALL (478) 555-0125</a>
            </div>
        </main>
    </div>
</body>

</html>
