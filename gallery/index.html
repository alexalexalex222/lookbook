<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Golden Book — Full Website Gallery (150)</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #12161c;
    --panel2: #181e27;
    --border: #2a3340;
    --text: #e8eef6;
    --muted: #8b97a8;
    --accent: #6ee7b7;
    --accent2: #60a5fa;
    --danger: #f87171;
    --chip: #1f2937;
    --radius: 12px;
    --sidebar: 340px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: grid;
    grid-template-columns: var(--sidebar) 1fr;
    grid-template-rows: 56px 1fr;
    grid-template-areas:
      "top top"
      "side main";
    min-height: 100vh;
  }
  header {
    grid-area: top;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #12161c 0%, #0f1318 100%);
  }
  header h1 {
    font-size: 15px;
    font-weight: 650;
    letter-spacing: 0.02em;
    margin: 0;
    white-space: nowrap;
  }
  header h1 span { color: var(--accent); }
  .stats {
    color: var(--muted);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .toolbar {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .toolbar button, .side-actions button, .card-actions a, .card-actions button {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--panel2);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 11px;
    font-size: 12px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .toolbar button:hover, .side-actions button:hover, .card-actions a:hover, .card-actions button:hover {
    border-color: #445164;
    background: #1e2632;
  }
  .toolbar button.active {
    border-color: var(--accent);
    color: var(--accent);
  }
  aside {
    grid-area: side;
    border-right: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .filters {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    display: grid;
    gap: 8px;
  }
  .filters input, .filters select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13px;
  }
  .filters label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    display: block;
    margin-bottom: 4px;
  }
  .side-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .list {
    overflow: auto;
    flex: 1;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .item {
    text-align: left;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text);
    border-radius: 10px;
    padding: 10px 10px;
    cursor: pointer;
    width: 100%;
  }
  .item:hover { background: var(--panel2); border-color: var(--border); }
  .item.active {
    background: #152018;
    border-color: #2f6b52;
    box-shadow: inset 0 0 0 1px rgba(110,231,183,0.15);
  }
  .item .t {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.25;
    margin-bottom: 4px;
  }
  .item .m {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .chip {
    font-size: 10px;
    color: var(--muted);
    background: var(--chip);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 2px 7px;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .chip.role-anchor { color: #fbbf24; border-color: #5b4a1e; }
  .chip.role-bank_example { color: var(--accent2); border-color: #1e3a5f; }
  main {
    grid-area: main;
    min-width: 0;
    min-height: 0;
    display: grid;
    grid-template-rows: auto 1fr;
    background: #07090c;
  }
  .preview-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-wrap: wrap;
  }
  .preview-bar .title {
    font-size: 14px;
    font-weight: 650;
  }
  .preview-bar .path {
    color: var(--muted);
    font-size: 11px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 50vw;
  }
  .card-actions { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }
  .frame-wrap {
    position: relative;
    min-height: 0;
    background:
      linear-gradient(45deg, #0e1218 25%, transparent 25%),
      linear-gradient(-45deg, #0e1218 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #0e1218 75%),
      linear-gradient(-45deg, transparent 75%, #0e1218 75%);
    background-size: 24px 24px;
    background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    background-color: #0a0d12;
  }
  iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: #fff;
  }
  .empty {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    color: var(--muted);
    padding: 24px;
    text-align: center;
  }
  .empty strong { color: var(--text); display: block; margin-bottom: 6px; font-size: 16px; }
  /* grid mode */
  body.grid-mode {
    grid-template-columns: 1fr;
    grid-template-areas:
      "top"
      "main";
  }
  body.grid-mode aside { display: none; }
  body.grid-mode main {
    grid-template-rows: auto 1fr;
  }
  body.grid-mode .preview-bar { display: none; }
  body.grid-mode .frame-wrap {
    overflow: auto;
    position: relative;
  }
  #grid {
    display: none;
    padding: 14px;
    gap: 12px;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  }
  body.grid-mode #grid { display: grid; }
  body.grid-mode #single { display: none; }
  .gcard {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 280px;
  }
  .gcard header {
    display: block;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--panel2);
  }
  .gcard .gt { font-size: 13px; font-weight: 650; margin-bottom: 4px; }
  .gcard .gm { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .gcard .gactions { display: flex; gap: 6px; }
  .gcard .gactions a, .gcard .gactions button {
    font-size: 11px;
    padding: 5px 8px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    text-decoration: none;
    cursor: pointer;
  }
  .gcard .preview {
    position: relative;
    flex: 1;
    min-height: 220px;
    background: #fff;
  }
  .gcard iframe {
    width: 1280px;
    height: 900px;
    transform: scale(0.25);
    transform-origin: 0 0;
    pointer-events: none;
  }
  .gcard .preview-hit {
    position: absolute;
    inset: 0;
    cursor: pointer;
  }
  .count-pill {
    font-size: 11px;
    color: var(--accent);
    background: rgba(110,231,183,0.08);
    border: 1px solid rgba(110,231,183,0.25);
    border-radius: 999px;
    padding: 3px 8px;
  }
  @media (max-width: 900px) {
    body {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto 1fr;
      grid-template-areas:
        "top"
        "side"
        "main";
    }
    aside { max-height: 40vh; }
  }
</style>
</head>

let filtered = CATALOG.slice();
let activeId = null;
let mode = 'single';
let widthMode = 'desktop';

const $ = (id) => document.getElementById(id);
const listEl = $('list');
const frame = $('frame');
const empty = $('empty');
const gridEl = $('grid');

function matches(item, q, bank, family, role) {
  if (bank && item.bank !== bank) return false;
  if (family && item.family_short !== family) return false;
  if (role && item.role !== role) return false;
  if (!q) return true;
  const hay = [
    item.id, item.pack_id, item.bank, item.title, item.family, item.family_short, item.role,
    ...(item.tones||[]), ...(item.motifs||[]), item.path
  ].join(' ').toLowerCase();
  return q.split(/\s+/).filter(Boolean).every(t => hay.includes(t));
}

function applyFilters() {
  const q = $('q').value.trim().toLowerCase();
  const bank = $('bank').value;
  const family = $('family').value;
  const role = $('role').value;
  filtered = CATALOG.filter(i => matches(i, q, bank, family, role));
  $('shown').textContent = filtered.length + ' shown';
  renderList();
  if (mode === 'grid') renderGrid();
  if (activeId && !filtered.some(i => keyOf(i) === activeId)) {
    if (filtered[0]) select(filtered[0]);
    else clearPreview();
  }
}

function keyOf(i) { return i.path; }

function renderList() {

    const btn = document.createElement('button');

        <span class="chip role-${escapeHtml(item.role)}">${escapeHtml(item.role)}</span>
        <span class="chip">${escapeHtml(item.bank_short)}</span>
        <span class="chip">${escapeHtml(item.family_short || '—')}</span>
      </div>`;
    btn.addEventListener('click', () => select(item));
    frag.appendChild(btn);
  });
  listEl.innerHTML = '';
  listEl.appendChild(frag);
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function select(item) {
  activeId = keyOf(item);
  $('ptitle').textContent = item.title;
  $('ppath').textContent = item.path + ' · ' + formatBytes(item.bytes);
  const url = item.url;
  $('open-tab').href = url;
  empty.hidden = true;
  frame.hidden = false;
  if (frame.dataset.src !== url) {
    frame.dataset.src = url;
    frame.src = url;
  }
  applyWidth();
  renderList();
  // scroll active into view
  const el = listEl.querySelector('.item.active');
  if (el) el.scrollIntoView({ block: 'nearest' });
  if (mode === 'grid') highlightGrid();
}

function clearPreview() {
  activeId = null;
  frame.hidden = true;
  frame.removeAttribute('src');
  frame.dataset.src = '';
  empty.hidden = false;
  $('ptitle').textContent = 'No match';
  $('ppath').textContent = '';
  $('open-tab').href = '#';
}

function formatBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
  return (n/1024/1024).toFixed(1) + ' MB';
}

function applyWidth() {
  const wrap = frame.parentElement;
  if (widthMode === 'phone') {
    frame.style.width = '390px';
    frame.style.left = '50%';
    frame.style.transform = 'translateX(-50%)';
    frame.style.right = 'auto';
  } else if (widthMode === 'tablet') {
    frame.style.width = '768px';
    frame.style.left = '50%';
    frame.style.transform = 'translateX(-50%)';
    frame.style.right = 'auto';
  } else {
    frame.style.width = '100%';
    frame.style.left = '0';
    frame.style.transform = 'none';
    frame.style.right = '0';
  }
}

function setMode(m) {
  mode = m;
  document.body.classList.toggle('grid-mode', m === 'grid');
  $('mode-single').classList.toggle('active', m === 'single');
  $('mode-grid').classList.toggle('active', m === 'grid');
  if (m === 'grid') renderGrid();
}

function renderGrid() {
  // Lazy: only create cards; iframes load when near viewport via IntersectionObserver
  gridEl.innerHTML = '';
  const frag = document.createDocumentFragment();
  filtered.forEach(item => {
    const card = document.createElement('article');
    card.className = 'gcard';
    card.dataset.path = item.path;
    card.innerHTML = `
      <header>
        <div class="gt">${escapeHtml(item.title)}</div>
        <div class="gm">
          <span class="chip role-${escapeHtml(item.role)}">${escapeHtml(item.role)}</span>
          <span class="chip">${escapeHtml(item.bank_short)}</span>
          <span class="chip">${escapeHtml(item.family_short || '—')}</span>
        </div>
        <div class="gactions">
          <button type="button" data-act="preview">Preview</button>
          <a href="${escapeHtml(item.url)}" target="_blank" rel="noopener">Open ↗</a>
        </div>
      </header>
      <div class="preview">
        <iframe title="${escapeHtml(item.title)}" loading="lazy" sandbox="allow-scripts allow-same-origin allow-forms" data-src="${escapeHtml(item.url)}"></iframe>
        <div class="preview-hit" data-act="preview"></div>
      </div>`;
    card.querySelectorAll('[data-act="preview"]').forEach(el => {
      el.addEventListener('click', () => {
        setMode('single');
        select(item);
      });
    });
    frag.appendChild(card);
  });
  gridEl.appendChild(frag);
  // lazy load iframes
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(en => {
      if (!en.isIntersecting) return;
      const iframe = en.target.querySelector('iframe');
      if (iframe && !iframe.src && iframe.dataset.src) {
        iframe.src = iframe.dataset.src;
      }
      obs.unobserve(en.target);
    });
  }, { root: gridEl.parentElement, rootMargin: '200px' });
  gridEl.querySelectorAll('.gcard').forEach(c => obs.observe(c));
  highlightGrid();
}

function highlightGrid() {
  gridEl.querySelectorAll('.gcard').forEach(c => {
    c.style.outline = c.dataset.path === activeId ? '2px solid #6ee7b7' : '';
  });
}

function step(delta) {
  if (!filtered.length) return;
  let idx = filtered.findIndex(i => keyOf(i) === activeId);
  if (idx < 0) idx = 0;
  else idx = (idx + delta + filtered.length) % filtered.length;
  select(filtered[idx]);
}

$('q').addEventListener('input', applyFilters);
$('bank').addEventListener('change', applyFilters);
$('family').addEventListener('change', applyFilters);
$('role').addEventListener('change', applyFilters);
$('prev').addEventListener('click', () => step(-1));
$('next').addEventListener('click', () => step(1));
$('first').addEventListener('click', () => filtered[0] && select(filtered[0]));
$('mode-single').addEventListener('click', () => setMode('single'));
$('mode-grid').addEventListener('click', () => setMode('grid'));
$('reload-frame').addEventListener('click', () => { if (frame.src) frame.src = frame.src; });
$('desktop').addEventListener('click', () => { widthMode='desktop'; applyWidth(); });
$('tablet').addEventListener('click', () => { widthMode='tablet'; applyWidth(); });
$('phone').addEventListener('click', () => { widthMode='phone'; applyWidth(); });
$('copy-path').addEventListener('click', async () => {
  const p = $('ppath').textContent.split(' · ')[0];
  if (!p) return;
  try { await navigator.clipboard.writeText(p); } catch(e) {}
});
$('open-all-visible').addEventListener('click', () => {
  const n = Math.min(20, filtered.length);
  if (!confirm(`Open ${n} of ${filtered.length} visible sites in new tabs?`)) return;
  filtered.slice(0, n).forEach(i => window.open(i.url, '_blank'));
});

document.addEventListener('keydown', (e) => {
  if (e.target.matches('input, select, textarea')) return;
  if (e.key === 'j' || e.key === 'ArrowDown') { e.preventDefault(); step(1); }
  if (e.key === 'k' || e.key === 'ArrowUp') { e.preventDefault(); step(-1); }
  if (e.key === 'g') setMode(mode === 'grid' ? 'single' : 'grid');
  if (e.key === 'Enter' && activeId) {
    const item = filtered.find(i => keyOf(i) === activeId);
    if (item) window.open(item.url, '_blank');
  }
});

// init
$('stats').textContent = CATALOG.length + ' websites · lookbook-clean goldensets';
applyFilters();
if (filtered[0]) select(filtered[0]);
</script>
</body>
</html>
