<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harborpipe Plumbing | The Heritage of Flow</title>
    <meta name="description"
        content="Savannah's most trusted premium plumbing service. A family legacy of excellence since 1968.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,600&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="site-wrapper">
        <header class="header">
            <div class="header-inner">
                <div class="logo">Harborpipe Plumbing</div>
                <nav class="nav-links">
                    <a href="#services">Services</a>
                    <a href="#projects">Projects</a>
                    <a href="#about">About</a>
                    <a href="#contact">Contact</a>
                </nav>
            </div>
        </header>

        <main class="hero" id="home">
            <div class="hero-bg" aria-hidden="true">
                <!-- Bespoke engraved scene: brass standpipe over harbor current, in the page's gold-on-ocean language -->
                <svg viewBox="0 0 1440 900" preserveAspectRatio="xMinYMid slice" xmlns="http://www.w3.org/2000/svg"
                    focusable="false">
                    <defs>
                        <linearGradient id="hp-pipe" x1="0" y1="0" x2="1" y2="0">
                            <stop offset="0" stop-color="#030f1a" />
                            <stop offset="0.22" stop-color="#0a2740" />
                            <stop offset="0.46" stop-color="#17405f" />
                            <stop offset="0.56" stop-color="#1d4b6e" />
                            <stop offset="0.66" stop-color="#143a58" />
                            <stop offset="0.82" stop-color="#092338" />
                            <stop offset="1" stop-color="#030f1a" />
                        </linearGradient>
                        <linearGradient id="hp-flow" x1="0" y1="0" x2="1" y2="0">
                            <stop offset="0" stop-color="#CBA358" stop-opacity="0" />
                            <stop offset="0.25" stop-color="#CBA358" stop-opacity="0.5" />
                            <stop offset="0.75" stop-color="#EBD399" stop-opacity="0.3" />
                            <stop offset="1" stop-color="#EBD399" stop-opacity="0" />
                        </linearGradient>
                        <radialGradient id="hp-glow">
                            <stop offset="0" stop-color="#CBA358" stop-opacity="0.16" />
                            <stop offset="0.55" stop-color="#CBA358" stop-opacity="0.05" />
                            <stop offset="1" stop-color="#CBA358" stop-opacity="0" />
                        </radialGradient>
                        <linearGradient id="hp-vignette" x1="0" y1="0" x2="1" y2="0">
                            <stop offset="0" stop-color="#051A2C" stop-opacity="0" />
                            <stop offset="0.42" stop-color="#051A2C" stop-opacity="0.1" />
                            <stop offset="0.62" stop-color="#051A2C" stop-opacity="0.72" />
                            <stop offset="0.8" stop-color="#051A2C" stop-opacity="0.97" />
                            <stop offset="1" stop-color="#051A2C" stop-opacity="1" />
                        </linearGradient>
                        <pattern id="hp-grid" width="120" height="900" patternUnits="userSpaceOnUse">
                            <path d="M0.5 0V900" stroke="#F0F4F8" stroke-opacity="0.04" />
                        </pattern>
                    </defs>

                    <rect width="1440" height="900" fill="#051A2C" />
                    <rect width="1440" height="900" fill="url(#hp-grid)" />
                    <ellipse cx="360" cy="450" rx="540" ry="470" fill="url(#hp-glow)" />

                    <!-- Engraved precision rings -->
                    <circle cx="360" cy="450" r="300" fill="none" stroke="#CBA358" stroke-opacity="0.1" />
                    <circle cx="360" cy="450" r="224" fill="none" stroke="#CBA358" stroke-opacity="0.16"
                        stroke-dasharray="2 10" />

                    <!-- Harbor current: gilded streamlines passing behind the standpipe -->
                    <g fill="none" stroke="url(#hp-flow)">
                        <path d="M-60 596 C 220 560, 410 646, 668 618" stroke-width="1" />
                        <path d="M-60 642 C 240 602, 420 702, 700 662" stroke-width="1.5" />
                        <path d="M-60 692 C 260 652, 430 762, 722 708" stroke-width="1" />
                        <path d="M-60 740 C 250 708, 450 812, 692 754" stroke-width="2" />
                        <path d="M-60 790 C 240 762, 440 858, 644 802" stroke-width="1.2" />
                    </g>

                    <!-- The standpipe -->
                    <rect x="285" y="-20" width="150" height="940" fill="url(#hp-pipe)" />
                    <path d="M303 -20 V920" stroke="#EBD399" stroke-opacity="0.26" stroke-width="1.5" />
                    <path d="M424 -20 V920" stroke="#9A7737" stroke-opacity="0.22" />

                    <!-- Flanged couplings and datum collar -->
                    <g stroke="#CBA358">
                        <rect x="263" y="150" width="194" height="46" rx="5" fill="url(#hp-pipe)"
                            stroke-opacity="0.4" />
                        <path d="M285 142 H435 M285 204 H435" stroke-opacity="0.16" />
                        <rect x="263" y="560" width="194" height="46" rx="5" fill="url(#hp-pipe)"
                            stroke-opacity="0.4" />
                        <path d="M285 552 H435 M285 614 H435" stroke-opacity="0.16" />
                        <rect x="277" y="424" width="166" height="12" rx="3" fill="#0d2c47" stroke-opacity="0.3" />
                    </g>
                    <g fill="#CBA358" fill-opacity="0.55">
                        <circle cx="288" cy="173" r="4" />
                        <circle cx="324" cy="173" r="4" />
                        <circle cx="360" cy="173" r="4" />
                        <circle cx="396" cy="173" r="4" />
                        <circle cx="432" cy="173" r="4" />
                        <circle cx="288" cy="583" r="4" />
                        <circle cx="324" cy="583" r="4" />
                        <circle cx="360" cy="583" r="4" />
                        <circle cx="396" cy="583" r="4" />
                        <circle cx="432" cy="583" r="4" />
                    </g>

                    <!-- Survey ticks off the datum collar -->
                    <g stroke="#CBA358">
                        <path d="M451 250h14M451 290h14M451 330h14M451 370h14M451 410h14M451 450h14M451 490h14M451 530h14"
                            stroke-opacity="0.3" />
                        <path d="M451 430h34" stroke-opacity="0.55" />
                        <rect x="492" y="426" width="8" height="8" transform="rotate(45 496 430)" fill="#CBA358"
                            fill-opacity="0.5" stroke="none" />
                    </g>

                    <rect width="1440" height="900" fill="url(#hp-vignette)" />
                </svg>
            </div>

            <div class="hero-content-wrapper">
                <div class="hero-spacer"></div> <!-- Pushes content to the right -->
                <div class="hero-text-block">
                    <h1 class="hero-title">
                        <span class="title-line">The Heritage</span>
                        <span class="title-line">of Flow</span>
                    </h1>
                    <h2 class="hero-subtitle">Harborpipe Plumbing</h2>

                    <div class="hero-divider"></div>

                    <div class="hero-bottom-info">
                        <div class="info-group">
                            <span class="info-label">ESTABLISHED</span>
                            <span class="info-value">1968</span>
                        </div>
                        <div class="info-group">
                            <span class="info-label">LOCATION</span>
                            <span class="info-value">SAVANNAH, GA</span>
                        </div>
                        <a href="tel:9125550121" class="btn-discover">
                            <span>CALL (912) 555-0121</span>
                            <span class="arrow" aria-hidden="true">&rarr;</span>
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
