<div class="compare" id="compare">
  <div class="compare__stage">
    <svg class="compare__art compare__art--after" viewBox="0 0 1200 620" role="img" aria-label="Conceptual finished grade"></svg>
    <div class="compare__before" id="compareBefore">
      <svg class="compare__art compare__art--before" viewBox="0 0 1200 620" role="img" aria-label="Conceptual existing slope"></svg>
    </div>
    <div class="compare__divider" id="compareDivider" aria-hidden="true"></div>
  </div>
  <label class="compare__control" for="compareRange">
    <span>Reveal finished intent</span>
    <input id="compareRange" type="range" min="5" max="95" value="48">
    <output id="compareOutput" for="compareRange">52% finished intent visible</output>
  </label>
</div>
